# nginx vhost for the MSVA demo — coexists with any existing sites on this server.
# Install:
#   sudo cp deploy/nginx-msva.conf /etc/nginx/sites-available/msva.conf
#   sudo ln -s /etc/nginx/sites-available/msva.conf /etc/nginx/sites-enabled/msva.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: simplest is to keep Cloudflare's proxy ON (orange cloud) with SSL mode
# "Full" or "Flexible" — Cloudflare serves https to visitors and talks to this
# http:80 origin. (Browsers need https for the mic; Cloudflare provides it.)
# Alternative without Cloudflare proxy: set the record to DNS-only and run
# `sudo certbot --nginx -d msva.maplestudios.co.in` to add a real cert here.

server {
    listen 80;
    listen [::]:80;
    server_name msva.maplestudios.co.in;

    # Static single-page app (the built web bundle — NOT the repo root).
    root /var/www/msva/apps/web/dist;
    index index.html;

    # REST API + SSE.
    location /api/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;          # let SSE / streaming flush
        proxy_read_timeout 3600s;
    }

    # In-browser Live Call WebSocket.
    location /browser {
        proxy_pass http://127.0.0.1:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Real-phone (Exotel/Twilio) endpoints — only used if you connect a DID.
    location /voice {
        proxy_pass http://127.0.0.1:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
    location /exotel/ {
        proxy_pass http://127.0.0.1:4200;
        proxy_set_header Host $host;
    }

    # Everything else: serve the SPA, falling back to index.html.
    location / {
        try_files $uri /index.html;
    }
}
